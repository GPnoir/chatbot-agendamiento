AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Chatbot de Agendamiento - Lambda + API Gateway + DynamoDB

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.11
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ChatbotTable
        RATE_LIMITER_BACKEND: dynamo
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        TELEGRAM_WEBHOOK_SECRET: !Ref TelegramWebhookSecret
        WHATSAPP_TOKEN: !Ref WhatsAppToken
        WHATSAPP_PHONE_NUMBER_ID: !Ref WhatsAppPhoneNumberId
        WHATSAPP_VERIFY_TOKEN: !Ref WhatsAppVerifyToken
        WHATSAPP_APP_SECRET: !Ref WhatsAppAppSecret
        ADMIN_API_KEY: !Ref AdminApiKey
        GOOGLE_CALENDAR_ENABLED: !Ref GoogleCalendarEnabled
        GOOGLE_OAUTH_CLIENT_ID: !Ref GoogleOAuthClientId
        GOOGLE_OAUTH_CLIENT_SECRET: !Ref GoogleOAuthClientSecret
        GOOGLE_OAUTH_REFRESH_TOKEN: !Ref GoogleOAuthRefreshToken
        GOOGLE_CALENDAR_ID: !Ref GoogleCalendarId
        GOOGLE_CALENDAR_TIMEZONE: !Ref GoogleCalendarTimezone

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
  TelegramWebhookSecret:
    Type: String
    NoEcho: true
    MinLength: 1
  WhatsAppToken:
    Type: String
    NoEcho: true
  WhatsAppPhoneNumberId:
    Type: String
    NoEcho: true
  WhatsAppVerifyToken:
    Type: String
    NoEcho: true
    MinLength: 1
  WhatsAppAppSecret:
    Type: String
    NoEcho: true
    Default: ''
  AdminApiKey:
    Type: String
    NoEcho: true
    Default: ''
  AlarmEmail:
    Type: String
    NoEcho: true
    Default: ''
    Description: >
      Optional email address for alarm notifications. When empty, alarms are
      created but no notifications are sent (still visible in CloudWatch console
      and dashboards).
  # ── Google Calendar (issue #14) — opt-in, OFF by default ──────────
  GoogleCalendarEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable best-effort appointment sync to Google Calendar.
  GoogleOAuthClientId:
    Type: String
    NoEcho: true
    Default: ''
  GoogleOAuthClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  GoogleOAuthRefreshToken:
    Type: String
    NoEcho: true
    Default: ''
  GoogleCalendarId:
    Type: String
    Default: 'primary'
    Description: Calendar ID to write events to ('primary' or the calendar address).
  GoogleCalendarTimezone:
    Type: String
    Default: 'America/Santiago'

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Resources:
  # ── DynamoDB ──────────────────────────────────────────────────────
  ChatbotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chatbot-agendamiento
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Lambda Function ───────────────────────────────────────────────
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chatbot-agendamiento
      Handler: lambda_handler.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
      Events:
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: get
        WhatsAppVerify:
          Type: Api
          Properties:
            Path: /whatsapp/webhook
            Method: get
        WhatsAppMessage:
          Type: Api
          Properties:
            Path: /whatsapp/webhook
            Method: post
        TelegramWebhook:
          Type: Api
          Properties:
            Path: /telegram/webhook
            Method: post
        AdminAgenda:
          Type: Api
          Properties:
            Path: /admin/agenda
            Method: get
        AdminPanel:
          Type: Api
          Properties:
            Path: /admin/panel
            Method: get

  # ── Reminder Lambda ────────────────────────────────────────────────
  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chatbot-reminder
      Handler: reminder_handler.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
      Events:
        HourlyCheck:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

  # ── Warm-up (evitar cold starts) ─────────────────────────────────
  WarmUpRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Id: WarmUpTarget
          Arn: !GetAtt ChatbotFunction.Arn
          Input: '{"resource":"/health","path":"/health","httpMethod":"GET","headers":{},"multiValueHeaders":{},"queryStringParameters":null,"multiValueQueryStringParameters":null,"pathParameters":null,"stageVariables":null,"requestContext":{"stage":"Prod","resourcePath":"/health","httpMethod":"GET"},"body":null,"isBase64Encoded":false}'

  WarmUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmUpRule.Arn

  # ── Alarm Notifications (optional) ───────────────────────────────
  # AlarmTopic is only created when AlarmEmail is provided.
  # Alarms always exist; actions are conditionally wired to the topic.
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub '${AWS::StackName}-alarm-notifications'
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # ── CloudWatch Alarms ─────────────────────────────────────────────

  # Lambda: unhandled errors (any Error count >= 1 in a 5-minute window).
  AlarmLambdaErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lambda-errors'
      AlarmDescription: Lambda ChatbotFunction raised at least one error in the last 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ChatbotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # Lambda: the scheduled ReminderFunction fails silently otherwise — no user
  # ever sees its errors, so an alarm is the only feedback channel.
  AlarmReminderErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-reminder-errors'
      AlarmDescription: Lambda ReminderFunction raised at least one error in the last 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReminderFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # Lambda: throttles indicate concurrency pressure or burst-limit hits.
  AlarmLambdaThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lambda-throttles'
      AlarmDescription: Lambda ChatbotFunction was throttled at least once in the last 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ChatbotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # DynamoDB: read throttle events.
  # NOTE: PAY_PER_REQUEST (on-demand) tables do not reliably publish
  # ThrottledRequests. AWS recommends ReadThrottleEvents and
  # WriteThrottleEvents as separate alarms for on-demand tables.
  AlarmDynamoDBReadThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-dynamodb-read-throttles'
      AlarmDescription: DynamoDB ChatbotTable had at least one read throttle event in the last 5 minutes.
      Namespace: AWS/DynamoDB
      MetricName: ReadThrottleEvents
      Dimensions:
        - Name: TableName
          Value: !Ref ChatbotTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # DynamoDB: write throttle events (companion to the read alarm above).
  AlarmDynamoDBWriteThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-dynamodb-write-throttles'
      AlarmDescription: DynamoDB ChatbotTable had at least one write throttle event in the last 5 minutes.
      Namespace: AWS/DynamoDB
      MetricName: WriteThrottleEvents
      Dimensions:
        - Name: TableName
          Value: !Ref ChatbotTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # API Gateway 5XX: server-side errors warrant immediate attention.
  # The ApiName dimension for SAM's implicit ServerlessRestApi is the
  # CloudFormation stack name. SAM generates the implicit REST API with
  # the logical name ServerlessRestApi and sets its Name property to the
  # stack name, so the ApiName dimension value equals AWS::StackName.
  AlarmApiGateway5XX:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-apigw-5xx'
      AlarmDescription: API Gateway returned at least one 5XX error in the last 5 minutes.
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub '${AWS::StackName}'
        - Name: Stage
          Value: Prod
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  # API Gateway 4XX: threshold set to 10 rather than 1 because a handful
  # of 4xx responses per window is normal (bots, invalid paths, health
  # probes). Alerting at >= 10 catches scanners or misconfigured clients
  # without generating false-positive noise from routine traffic.
  AlarmApiGateway4XX:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-apigw-4xx'
      AlarmDescription: API Gateway returned 10 or more 4XX errors in the last 5 minutes (possible scanner or misconfigured client).
      Namespace: AWS/ApiGateway
      MetricName: 4XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub '${AWS::StackName}'
        - Name: Stage
          Value: Prod
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

Outputs:
  ApiUrl:
    Description: URL base del API Gateway
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  WhatsAppWebhookUrl:
    Description: URL para configurar en Meta Developer Console
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/whatsapp/webhook"
  TelegramWebhookUrl:
    Description: URL para configurar en Telegram
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/telegram/webhook"

  # ── Alarm Outputs ─────────────────────────────────────────────────
  AlarmTopicArn:
    Condition: HasAlarmEmail
    Description: SNS topic ARN used for alarm notifications
    Value: !Ref AlarmTopic

  AlarmLambdaErrorsArn:
    Description: ARN of the Lambda errors alarm
    Value: !GetAtt AlarmLambdaErrors.Arn

  AlarmReminderErrorsArn:
    Description: ARN of the reminder function errors alarm
    Value: !GetAtt AlarmReminderErrors.Arn

  AlarmLambdaThrottlesArn:
    Description: ARN of the Lambda throttles alarm
    Value: !GetAtt AlarmLambdaThrottles.Arn

  AlarmDynamoDBReadThrottlesArn:
    Description: ARN of the DynamoDB read throttles alarm
    Value: !GetAtt AlarmDynamoDBReadThrottles.Arn

  AlarmDynamoDBWriteThrottlesArn:
    Description: ARN of the DynamoDB write throttles alarm
    Value: !GetAtt AlarmDynamoDBWriteThrottles.Arn

  AlarmApiGateway5XXArn:
    Description: ARN of the API Gateway 5XX error alarm
    Value: !GetAtt AlarmApiGateway5XX.Arn

  AlarmApiGateway4XXArn:
    Description: ARN of the API Gateway 4XX error alarm
    Value: !GetAtt AlarmApiGateway4XX.Arn
