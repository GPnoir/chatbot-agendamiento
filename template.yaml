AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Chatbot de Agendamiento - Lambda + API Gateway + DynamoDB

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.11
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ChatbotTable
        RATE_LIMITER_BACKEND: dynamo
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        TELEGRAM_WEBHOOK_SECRET: !Ref TelegramWebhookSecret
        WHATSAPP_TOKEN: !Ref WhatsAppToken
        WHATSAPP_PHONE_NUMBER_ID: !Ref WhatsAppPhoneNumberId
        WHATSAPP_VERIFY_TOKEN: !Ref WhatsAppVerifyToken
        WHATSAPP_APP_SECRET: !Ref WhatsAppAppSecret
        ADMIN_API_KEY: !Ref AdminApiKey

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
  TelegramWebhookSecret:
    Type: String
    NoEcho: true
    MinLength: 1
  WhatsAppToken:
    Type: String
    NoEcho: true
  WhatsAppPhoneNumberId:
    Type: String
    NoEcho: true
  WhatsAppVerifyToken:
    Type: String
    NoEcho: true
    MinLength: 1
  WhatsAppAppSecret:
    Type: String
    NoEcho: true
    Default: ''
  AdminApiKey:
    Type: String
    NoEcho: true
    Default: ''

Resources:
  # ── DynamoDB ──────────────────────────────────────────────────────
  ChatbotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chatbot-agendamiento
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Lambda Function ───────────────────────────────────────────────
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chatbot-agendamiento
      Handler: lambda_handler.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
      Events:
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: get
        WhatsAppVerify:
          Type: Api
          Properties:
            Path: /whatsapp/webhook
            Method: get
        WhatsAppMessage:
          Type: Api
          Properties:
            Path: /whatsapp/webhook
            Method: post
        TelegramWebhook:
          Type: Api
          Properties:
            Path: /telegram/webhook
            Method: post
        AdminAgenda:
          Type: Api
          Properties:
            Path: /admin/agenda
            Method: get
        AdminPanel:
          Type: Api
          Properties:
            Path: /admin/panel
            Method: get

  # ── Reminder Lambda ────────────────────────────────────────────────
  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chatbot-reminder
      Handler: reminder_handler.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
      Events:
        HourlyCheck:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

  # ── Warm-up (evitar cold starts) ─────────────────────────────────
  WarmUpRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Id: WarmUpTarget
          Arn: !GetAtt ChatbotFunction.Arn
          Input: '{"resource":"/health","path":"/health","httpMethod":"GET","headers":{},"multiValueHeaders":{},"queryStringParameters":null,"multiValueQueryStringParameters":null,"pathParameters":null,"stageVariables":null,"requestContext":{"stage":"Prod","resourcePath":"/health","httpMethod":"GET"},"body":null,"isBase64Encoded":false}'

  WarmUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmUpRule.Arn

Outputs:
  ApiUrl:
    Description: URL base del API Gateway
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  WhatsAppWebhookUrl:
    Description: URL para configurar en Meta Developer Console
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/whatsapp/webhook"
  TelegramWebhookUrl:
    Description: URL para configurar en Telegram
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/telegram/webhook"
